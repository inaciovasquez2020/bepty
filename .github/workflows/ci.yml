name: CI

on:
  push:
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository structure
        run: |
          test -f README.md
          test -f LICENSE
          test -f STATUS.md
          test -f THEORY_INDEX.md
          test -f theory/BEpTy_Foundations.md
          test -f notes/URF_BRIDGE.md
          test -f examples/finite_demo.md
      - name: Verify core laws are present
        run: |
          grep -q "Zero law" theory/BEpTy_Foundations.md
          grep -q "Decomposition law" theory/BEpTy_Foundations.md
          grep -q "Detection law" theory/BEpTy_Foundations.md
          grep -q "Monotonicity law" theory/BEpTy_Foundations.md

      - name: Run local exhaustion demo
        run: |
          python3 examples/local_exhaustion_demo.py > /tmp/local_exhaustion_demo.out
          grep -q "CASE: C4" /tmp/local_exhaustion_demo.out
          grep -q "CASE: Tree" /tmp/local_exhaustion_demo.out
          grep -q "beta_dim_R(G): 1" /tmp/local_exhaustion_demo.out
          grep -q "beta_dim_R(G): 0" /tmp/local_exhaustion_demo.out
      - name: Run profiled Betti demo
        run: python3 examples/profiled_betti_demo.py
      - name: Run sheaf/profile target demo
        run: python3 examples/sheaf_profile_target.py
      - name: Run admissible morphism demo
        run: python3 examples/admissible_morphism_demo.py
      - name: Run colimit-kernel obstruction tests
        run: python3 -m pytest -q tests/test_colimit_kernel_obstruction.py
      - name: Run actual witness generator tests
        run: python3 -m pytest -q tests/test_actual_witness_generator.py
      - name: Run exact sheaf package comparison tests
        run: python3 -m pytest -q tests/test_exact_sheaf_package_compare.py
      - name: Run BEpTy certificate emission test
        run: python3 -m pytest -q tests/test_bepty_certificate_emission.py
      - name: Verify emitted BEpTy certificate directly
        run: python3 examples/emit_bepty_certificate.py && python3 verifier/verify_bepty_certificate.py artifacts/bepty_certificate_example.json
